<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %} - WIP</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
    <style>
        :root {
            --bg:           #1c1c1c;
            --surface:      #252525;
            --surface-hi:   #303030;
            --border:       #3a3a3a;
            --border-hi:    #505050;
            --text:         #b8b8b8;
            --text-bright:  #d8d8d8;
            --text-dim:     #a0a0a0;
            --link:         #c0c0c0;
            --danger:       #c84040;
            --success:      #408040;
            /* compat: pages referencing --accent get a neutral gray until cleaned up */
            --accent:       var(--text-dim);
            --accent-dim:   var(--text-dim);
            --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.25rem;
        }

        /* === SKIP NAV === */
        .skip-nav {
            position: absolute;
            top: -100%;
            left: 0;
            background: var(--text-bright);
            color: var(--bg);
            padding: 0.5rem 1rem;
            text-decoration: none;
            font-weight: bold;
            z-index: 9999;
        }

        .skip-nav:focus {
            top: 0;
        }

        /* === HEADER === */
        .site-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .site-title-section {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .site-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-bright);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .site-title:hover {
            color: #ffffff;
        }

        .putin-message {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.04em;
        }

        .nav-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.4rem;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            border: 1px solid var(--border);
        }

        .nav-menu li + li {
            border-left: 1px solid var(--border);
        }

        .nav-menu a {
            color: var(--text);
            text-decoration: none;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            min-height: 44px;
            transition: color 0.1s, background 0.1s;
        }

        .nav-menu a:hover {
            color: var(--text-bright);
            background: var(--surface-hi);
        }

        .search-trigger {
            background: transparent;
            border: none;
            border-left: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0 1rem;
            min-height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-family: var(--font);
            transition: color 0.1s, background 0.1s;
        }

        .search-trigger:hover {
            color: var(--text-bright);
            background: var(--surface-hi);
        }

        .search-key-hint {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-left: 0.4rem;
            opacity: 0.6;
            font-family: var(--font);
        }

        /* === SEARCH OVERLAY === */
        .search-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 500;
            display: none;
            padding: 5rem 1.25rem 2rem;
            overflow-y: auto;
        }

        .search-overlay.active {
            display: block;
        }

        .search-modal {
            max-width: 700px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border-hi);
        }

        .search-modal-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-bright);
            font-family: var(--font);
            font-size: 0.95rem;
            padding: 0.85rem 1rem;
            outline: none;
        }

        .search-modal-results {
            list-style: none;
            max-height: 60vh;
            overflow-y: auto;
        }

        .search-result-item a {
            display: grid;
            grid-template-columns: 18ch 1fr;
            gap: 1.5rem;
            padding: 0.55rem 1rem;
            color: inherit;
            text-decoration: none;
            font-size: 0.875rem;
            min-height: 44px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            transition: background 0.08s;
        }

        .search-result-item a:hover,
        .search-result-item.sr-focused a {
            background: var(--surface-hi);
        }

        .search-result-item .item-name {
            color: var(--text-bright);
        }

        .search-result-item .item-desc {
            color: var(--text-dim);
            font-size: 0.82rem;
        }

        .search-empty {
            padding: 1rem;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .search-hint {
            padding: 0.5rem 1rem;
            color: var(--text-dim);
            font-size: 0.7rem;
            border-top: 1px solid var(--border);
            opacity: 0.7;
        }

        /* === MAIN CONTENT === */
        .main-content {
            padding: 2rem 0;
            min-height: calc(100vh - 160px);
        }

        /* === FOOTER === */
        .site-footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 1rem 0;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        /* === PAGE HEADER (individual pages) === */
        .page-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .breadcrumb {
            color: var(--text-dim);
            margin-bottom: 0.6rem;
            font-size: 0.8rem;
        }

        .breadcrumb a {
            color: var(--link);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .page-header h1 {
            font-size: 1.8rem;
            color: var(--text-bright);
            margin-bottom: 0.2rem;
        }

        .page-subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* === CONTENT SECTIONS === */
        .content-section {
            border: 1px solid var(--border);
            border-left: 3px solid var(--border-hi);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.25rem;
        }

        .content-section h2 {
            color: var(--text-bright);
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }

        .content-section h3 {
            color: var(--text);
            margin: 1rem 0 0.4rem;
            font-size: 0.95rem;
        }

        .content-section p {
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        .status-banner {
            border: 1px solid var(--border);
            border-left: 3px solid var(--border-hi);
            padding: 0.65rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.85rem;
            color: var(--text);
        }

        .status-banner.warning {
            border-left-color: var(--danger);
        }

        .main-content-area {
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text);
        }

        .main-content-area p {
            margin-bottom: 1rem;
        }

        .quote-box {
            border-left: 3px solid var(--border-hi);
            padding: 1rem 1.25rem;
            margin: 1.25rem 0;
        }

        .quote-box blockquote {
            margin: 0;
            font-style: italic;
            color: var(--text);
        }

        .quote-box cite {
            display: block;
            margin-top: 0.6rem;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .fun-facts {
            border: 1px solid var(--border);
            border-left: 3px solid var(--border-hi);
            padding: 1.25rem 1.5rem;
            margin: 1.25rem 0;
        }

        .fun-facts h3 {
            color: var(--text-bright);
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
        }

        .fun-facts ul {
            list-style: none;
            padding: 0;
        }

        .fun-facts li {
            padding: 0.3rem 0;
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .fun-facts li:last-child {
            border-bottom: none;
        }

        .fun-facts li::before {
            content: "> ";
            color: var(--text);
        }

        /* === MEMORIAL STYLES === */
        .memorial-intro {
            margin: 2rem 0;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .memorial-intro h1 {
            font-size: 1.8rem;
            color: var(--text-bright);
            margin-bottom: 0.5rem;
        }

        .memorial-subtitle {
            color: var(--text-dim);
            font-style: italic;
            font-size: 0.9rem;
        }

        .memorial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1px;
            margin: 1.5rem 0;
            background: var(--border);
            border: 1px solid var(--border);
        }

        .memorial-card {
            background: var(--surface);
            padding: 1.25rem;
            transition: background 0.1s;
        }

        .memorial-card:hover {
            background: var(--surface-hi);
        }

        .memorial-flame {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        @media (prefers-reduced-motion: no-preference) {
            @keyframes flicker {
                0%   { opacity: 0.5; }
                100% { opacity: 1; }
            }
            .memorial-flame {
                animation: flicker 2.5s infinite alternate;
            }
        }

        .memorial-card h3 {
            color: var(--text-bright);
            font-size: 0.95rem;
            margin-bottom: 0.15rem;
        }

        .memorial-title {
            color: var(--text-dim);
            font-weight: bold;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .memorial-cause {
            color: var(--text-dim);
            font-style: italic;
            line-height: 1.4;
            font-size: 0.8rem;
        }

        .memorial-thanks {
            border: 1px solid var(--border);
            border-left: 3px solid var(--border-hi);
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .memorial-thanks h2 {
            color: var(--text-bright);
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .memorial-thanks p {
            margin-bottom: 0.5rem;
            color: var(--text);
            font-size: 0.85rem;
        }

        .memorial-footer {
            margin: 1.5rem 0;
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* === NAV FOOTER (prev/next) === */
        .navigation-footer {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin: 2rem 0;
        }

        .nav-button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--link);
            padding: 0 1.5rem;
            min-height: 44px;
            text-decoration: none;
            flex: 1;
            text-align: center;
            font-family: var(--font);
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.1s, color 0.1s;
        }

        .nav-button:hover {
            border-color: var(--border-hi);
            color: var(--text-bright);
        }

        /* === IMAGE OVERLAY === */
        .image-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .image-overlay.active {
            display: flex;
        }

        .overlay-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .overlay-image {
            max-width: 100%;
            max-height: 90vh;
            border: 1px solid var(--border);
            display: block;
        }

        .close-button {
            position: absolute;
            top: -22px;
            right: -22px;
            width: 44px;
            height: 44px;
            background: var(--surface-hi);
            border: 1px solid var(--border-hi);
            color: var(--text-bright);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font);
            line-height: 1;
        }

        .close-button:hover {
            background: var(--border-hi);
            color: #ffffff;
        }

        /* === SHARED COMPONENTS === */
        .hero-image {
            width: 100%;
            max-width: 600px;
            height: auto;
            border: 1px solid var(--border);
            margin: 1.25rem auto;
            display: block;
        }

        /* === INDEX / FILTER === */
        .index-header {
            margin: 2rem 0 1.5rem;
        }

        .index-header h1 {
            font-size: 1.5rem;
            color: var(--text-bright);
            margin-bottom: 0.75rem;
        }

        /* fire background */
        /* fire background */
        #fire-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            mix-blend-mode: screen;
            opacity: 0.5;
        }

        #fire-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center bottom;
        }

        /* C — scroll-driven fire fade */
        @supports (animation-timeline: scroll()) {
            @keyframes fire-scroll-fade {
                from { opacity: 0.5; }
                to   { opacity: 0.07; }
            }
            #fire-bg {
                animation: fire-scroll-fade linear both;
                animation-timeline: scroll(root);
                animation-range: 0px 600px;
            }
        }

        /* A — CRT scanline overlay */
        #crt {
            position: fixed;
            inset: 0;
            z-index: 9000;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0,
                transparent 3px,
                rgba(0,0,0,0.09) 3px,
                rgba(0,0,0,0.09) 4px
            );
        }

        /* A — phosphor glow on headings */
        h1 { text-shadow: 0 0 14px rgba(216,216,216,0.28), 0 0 40px rgba(216,216,216,0.07); }
        h2 { text-shadow: 0 0 10px rgba(216,216,216,0.18); }

        /* A — glitch keyframes */
        @keyframes crt-glitch-h {
            0%,100% { transform: none; }
            25%     { transform: translateX(-5px) skewX(-0.4deg); }
            50%     { transform: translateX(4px); }
            75%     { transform: translateX(-3px) skewX(0.2deg); }
        }
        @keyframes crt-scan-sweep {
            from { top: -4px; }
            to   { top: 100%; }
        }
        body.crt-glitch .main-content {
            animation: crt-glitch-h 0.22s steps(3,end) forwards;
        }
        body.crt-glitch #crt::after {
            content: '';
            position: absolute;
            left: 0; right: 0; top: -4px;
            height: 3px;
            background: rgba(255,255,255,0.045);
            animation: crt-scan-sweep 0.22s linear forwards;
        }

        /* visual rhythm — prompt prefix on content section headings */
        .content-section h2::before {
            content: '> ';
            color: var(--text-dim);
            opacity: 0.5;
        }

        /* B — matched character highlight */
        .match-char {
            color: #c87820;
            font-weight: bold;
        }

        /* B — filter meta count */
        .filter-meta {
            font-size: 0.75rem;
            color: var(--text-dim);
            min-height: 1.2em;
            margin-top: -0.75rem;
            margin-bottom: 1rem;
            opacity: 1;
            transition: opacity 0.15s;
        }

        .index-tagline {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .filter-controls {
            margin-bottom: 1.5rem;
        }

        .filter-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-bright);
            font-family: var(--font);
            font-size: 0.9rem;
            padding: 0.6rem 0.75rem;
            outline: none;
        }

        .filter-input:focus {
            border-color: var(--border-hi);
        }

        .filter-input::placeholder {
            color: var(--text-dim);
        }

        .filter-list {
            list-style: none;
            display: flex;
            flex-direction: column;
        }

        .filter-item {
            border-bottom: 1px solid var(--border);
        }

        .filter-item.first-visible {
            border-top: 1px solid var(--border);
        }

        .filter-item a {
            display: grid;
            grid-template-columns: 18ch 1fr;
            gap: 1.5rem;
            padding: 0.55rem 0.5rem;
            color: inherit;
            text-decoration: none;
            font-size: 0.875rem;
            min-height: 44px;
            align-items: center;
            transition: background 0.08s;
        }

        .filter-item a:hover {
            background: var(--surface);
        }

        .item-name {
            color: var(--text-bright);
        }

        .item-desc {
            color: var(--text-dim);
        }

        .filter-empty {
            color: var(--text-dim);
            font-size: 0.85rem;
            padding: 1.5rem 0;
        }

        /* === FOCUS STYLES === */
        a:focus-visible,
        button:focus-visible,
        input:focus-visible {
            outline: 2px solid var(--text);
            outline-offset: 2px;
        }

        /* === RESPONSIVE === */
        @media (max-width: 640px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.6rem;
            }

            .nav-area {
                align-items: flex-start;
                width: 100%;
            }

            .page-header h1 {
                font-size: 1.4rem;
            }

            .navigation-footer {
                flex-direction: column;
            }

            .filter-item a {
                grid-template-columns: 1fr;
                gap: 0.2rem;
            }

            .item-desc {
                font-size: 0.8rem;
            }
        }

        @media print {
            .site-header,
            .site-footer,
            .image-overlay {
                display: none;
            }

            body {
                background: #fff;
                color: #000;
            }
        }

        /* === CLASSIC MODE === */
        :root.classic-mode {
            --bg:          #fdfdfd;
            --surface:     #ffffff;
            --surface-hi:  #f0f0f0;
            --border:      #e0e0e0;
            --border-hi:   #cccccc;
            --text:        #333333;
            --text-bright: #111111;
            --text-dim:    #666666;
            --link:        #2a7ae2;
            --danger:      #c0392b;
            --success:     #27ae60;
        }

        html.classic-mode body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        html.classic-mode #fire-bg,
        html.classic-mode #crt { display: none !important; }

        html.classic-mode h1,
        html.classic-mode h2,
        html.classic-mode h3 { text-shadow: none !important; }

        html.classic-mode .content-section h2::before { display: none; }

        .mode-toggle {
            background: transparent;
            border: none;
            border-left: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0 1rem;
            min-height: 44px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.8rem;
            transition: color 0.1s, background 0.1s;
        }

        .mode-toggle:hover {
            color: var(--text-bright);
            background: var(--surface-hi);
        }

        .mode-toggle .wip-label   { display: inline; }
        .mode-toggle .classic-label { display: none; }
        html.classic-mode .mode-toggle .wip-label   { display: none; }
        html.classic-mode .mode-toggle .classic-label { display: inline; }

        /* === CLASSIC SHELL SWAP === */
        #classic-header,
        #classic-footer { display: none; }

        html.classic-mode #wip-header,
        html.classic-mode #wip-footer { display: none; }

        html.classic-mode #classic-header,
        html.classic-mode #classic-footer { display: block; }

        html.classic-mode .main-content {
            background: none;
            padding: 0;
            max-width: none;
        }

        html.classic-mode .main-content > .container {
            max-width: none;
            padding: 0;
        }

        /* Mode toggle stays visible in both shells */
        #classic-header .mode-toggle-wrapper {
            position: fixed;
            top: 0.5rem;
            right: 1rem;
            z-index: 200;
        }

        #classic-header .mode-toggle-wrapper .mode-toggle {
            border: 1px solid #ccc;
            background: #fdfdfd;
            color: #666;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            min-height: unset;
        }
    </style>
    <link rel="stylesheet" href="{{ '/css/main.css' | relative_url }}" id="classicCSS" media="not all">
    <script>
        if (localStorage.getItem('classicMode') === 'true') {
            document.documentElement.classList.add('classic-mode');
            document.getElementById('classicCSS').media = 'all';
        }
    </script>
</head>
<body>
    <a href="#main-content" class="skip-nav">Skip to main content</a>

    <div id="classic-header">
        {% include header.html %}
        <div class="mode-toggle-wrapper">
            <button class="mode-toggle" aria-label="Switch to modern view">
                <span class="classic-label">Modern</span>
            </button>
        </div>
    </div>

    <header id="wip-header" class="site-header" role="banner">
        <div class="container">
            <div class="header-content">
                <div class="site-title-section">
                    <a href="/" class="site-title">tirefi.re</a>

    <div id="crt" aria-hidden="true"></div>

    <div class="page-content">

                </div>

    <div class="image-overlay" id="imageOverlay" role="dialog" aria-modal="true" aria-label="Tire fire image fullscreen">
        <div class="overlay-content">
            <img src="/tirefirebillow.gif" alt="A tire fire, billowing smoke" class="overlay-image" id="overlayImage">
            <button class="close-button" id="overlayClose" aria-label="Close fullscreen image">&times;</button>
        </div>
    </div>

    <div class="search-overlay" id="searchOverlay" role="dialog" aria-modal="true" aria-label="Site search">
        <div class="search-modal">
            <input type="search" id="searchOverlayInput" class="search-modal-input"
                placeholder="filter..." autocomplete="off" spellcheck="false"
                aria-label="Filter topics" aria-controls="searchOverlayResults">
            <ul class="search-modal-results" id="searchOverlayResults" aria-label="Search results"></ul>
            <div class="search-hint">↑↓ navigate &nbsp; ↵ open &nbsp; esc close</div>
        </div>
    </div>

    <script>
        /* === SITE SEARCH === */
        (function() {
            var ITEMS = [
                {name:'aws',                desc:"Amazon's infinite money extraction service",          tags:'cloud,amazon',                          url:'/aws/'},
                {name:'chef',               desc:'Too many cooks in the infrastructure kitchen',        tags:'config-mgmt,configmanagement,ruby',      url:'/chef/'},
                {name:'devops',             desc:'You build it, you break it, you cry about it',        tags:'culture,process',                        url:'/devops/'},
                {name:'dns',                desc:"It's always DNS. Always.",                            tags:'networking,infra',                       url:'/dns/'},
                {name:'docker',             desc:'Containerizing your problems since 2013',             tags:'containers,infra',                       url:'/docker/'},
                {name:'incident management',desc:'Managing incidents by creating more incidents',       tags:'incidents,oncall,on-call',               url:'/incident-management/'},
                {name:'microservices',      desc:'Distributed monoliths with extra steps',              tags:'containers,architecture,distributed',    url:'/microservices/'},
                {name:'monitoring',         desc:'Watching everything burn in real-time',               tags:'observability,incidents,oncall,alerting', url:'/monitoring/'},
                {name:'ops',                desc:'Where hope goes to die',                              tags:'culture,oncall,on-call,infra',           url:'/ops/'},
                {name:'puppet',             desc:'Configuration management with strings attached',      tags:'config-mgmt,configmanagement,ruby',      url:'/puppet/'},
                {name:'s3',                 desc:'Simple storage service. Simply not working.',         tags:'cloud,amazon,storage',                   url:'/s3/'},
                {name:'serverless',         desc:'No servers. Just someone else\'s servers.',           tags:'cloud,architecture',                     url:'/serverless/'},
                {name:'systemd',            desc:"Doing everything so you don't have to understand anything", tags:'linux,infra,os',                  url:'/systemd/'},
                {name:'rvm',                desc:'The wrapper that manages the thing that manages the thing', tags:'culture,config-mgmt',              url:'/rvm/'},
                {name:'simon and czarfunkel',desc:'Hello czarkness my old friend',                      tags:'culture',                                url:'/simonandczarfunkel/'},
                {name:'sk8 or die',         desc:'Kickstart files as a form of creative expression',    tags:'linux,culture',                          url:'/sk8-die/'},
                {name:'sysadmin day',       desc:'The one day a year ops gets acknowledged',             tags:'culture',                                url:'/sysadmin-day/'},
                {name:'trumpdays',          desc:'The production system that cannot come down for maintenance', tags:'culture',                          url:'/trumpdays/'},
                {name:'vmworld',            desc:'The cert that now costs $80k per year to use',        tags:'enterprise',                             url:'/vmworld/'},
                {name:'weblogic',           desc:'Logic not included',                                  tags:'enterprise,java,oracle',                 url:'/weblogic/'},
                {name:'well actually',      desc:'Technically correct, contextually useless',           tags:'culture',                                url:'/wellactually/'},
                {name:'windows',            desc:'Blue screens of death in the cloud',                  tags:'enterprise,os,microsoft',                url:'/windows/'},
                {name:'zoom',               desc:'Accidental critical infrastructure, approved by nobody in IT', tags:'culture',                        url:'/zoom/'},
            ];

            var trigger   = document.getElementById('searchTrigger');
            var sOverlay  = document.getElementById('searchOverlay');
            var sInput    = document.getElementById('searchOverlayInput');
            var sResults  = document.getElementById('searchOverlayResults');
            var lastFocusedSearch = null;
            var focusedIdx = -1;

            function fuzzyScore(query, target) {
                var q = query.toLowerCase(), t = target.toLowerCase();
                var qi = 0, positions = [];
                for (var ti = 0; ti < t.length && qi < q.length; ti++) {
                    if (t[ti] === q[qi]) { positions.push(ti); qi++; }
                }
                if (qi < q.length) return 0;
                var score = 100;
                score -= positions[0] * 3;
                for (var i = 1; i < positions.length; i++) {
                    if (positions[i] === positions[i-1] + 1) score += 15;
                }
                var c = positions[0];
                if (c === 0 || /[\s\-_,]/.test(t[c-1])) score += 25;
                if (t.indexOf(q) !== -1) score += 20;
                return Math.max(1, score);
            }

            function scoreItem(query, item) {
                return Math.max(
                    fuzzyScore(query, item.name) * 4,
                    fuzzyScore(query, item.desc) * 2,
                    fuzzyScore(query, item.tags.replace(/,/g, ' ')) * 1
                );
            }

            function renderResults(query) {
                sResults.innerHTML = '';
                focusedIdx = -1;
                if (!query) return;

                var scored = ITEMS.map(function(item) {
                    return {item: item, score: scoreItem(query, item)};
                }).filter(function(s) { return s.score > 0; })
                  .sort(function(a, b) { return b.score - a.score; });

                if (!scored.length) {
                    sResults.innerHTML = '<li class="search-empty">no matches</li>';
                    return;
                }

                scored.forEach(function(s, idx) {
                    var li = document.createElement('li');
                    li.className = 'search-result-item';
                    li.dataset.idx = idx;
                    li.innerHTML = '<a href="' + s.item.url + '">' +
                        '<span class="item-name">' + s.item.name + '</span>' +
                        '<span class="item-desc">' + s.item.desc + '</span>' +
                        '</a>';
                    sResults.appendChild(li);
                });
            }

            function moveFocus(dir) {
                var items = sResults.querySelectorAll('.search-result-item');
                if (!items.length) return;
                items[focusedIdx] && items[focusedIdx].classList.remove('sr-focused');
                focusedIdx = Math.max(0, Math.min(items.length - 1, focusedIdx + dir));
                items[focusedIdx].classList.add('sr-focused');
                items[focusedIdx].scrollIntoView({block: 'nearest'});
            }

            function openSearch(triggerEl) {
                lastFocusedSearch = triggerEl || document.activeElement;
                sOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                sInput.value = '';
                sResults.innerHTML = '';
                focusedIdx = -1;
                sInput.focus();
            }

            function closeSearch() {
                sOverlay.classList.remove('active');
                document.body.style.overflow = '';
                if (lastFocusedSearch) lastFocusedSearch.focus();
            }

            trigger.addEventListener('click', function() { openSearch(trigger); });

            sOverlay.addEventListener('click', function(e) {
                if (e.target === sOverlay) closeSearch();
            });

            sInput.addEventListener('input', function() {
                renderResults(sInput.value.trim());
                focusedIdx = -1;
            });

            sInput.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') { closeSearch(); return; }
                if (e.key === 'ArrowDown') { e.preventDefault(); moveFocus(1); return; }
                if (e.key === 'ArrowUp')   { e.preventDefault(); moveFocus(-1); return; }
                if (e.key === 'Enter') {
                    var focused = sResults.querySelector('.sr-focused a');
                    if (focused) { closeSearch(); window.location.href = focused.href; }
                }
            });

            document.addEventListener('keydown', function(e) {
                var tag = document.activeElement && document.activeElement.tagName;
                if (e.key === '/' && tag !== 'INPUT' && tag !== 'TEXTAREA' && !sOverlay.classList.contains('active')) {
                    e.preventDefault();
                    openSearch();
                }
                if (e.key === 'Escape' && sOverlay.classList.contains('active')) {
                    closeSearch();
                }
            });
        })();

        /* === IMAGE OVERLAY === */
        (function() {
            var overlay = document.getElementById('imageOverlay');
            var closeBtn = document.getElementById('overlayClose');
            var lastFocused = null;

            function openOverlay(triggerEl) {
                lastFocused = triggerEl || document.activeElement;
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                closeBtn.focus();
            }

            function closeOverlay() {
                overlay.classList.remove('active');
                document.body.style.overflow = '';
                if (lastFocused) lastFocused.focus();
            }

            closeBtn.addEventListener('click', closeOverlay);

            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) closeOverlay();
            });

            document.addEventListener('keydown', function(e) {
                if (!overlay.classList.contains('active')) return;
                if (e.key === 'Escape') {
                    closeOverlay();
                } else if (e.key === 'Tab') {
                    /* Focus trap: only close button is focusable in the overlay */
                    e.preventDefault();
                    closeBtn.focus();
                }
            });

            document.addEventListener('DOMContentLoaded', function() {
                var heroGif = document.querySelector('.hero-gif');
                if (heroGif) {
                    heroGif.setAttribute('role', 'button');
                    heroGif.setAttribute('tabindex', '0');
                    heroGif.setAttribute('aria-label', 'Open tire fire image fullscreen');
                    heroGif.addEventListener('click', function() { openOverlay(heroGif); });
                    heroGif.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            openOverlay(heroGif);
                        }
                    });
                }
            });

            window.openOverlay = openOverlay;
        })();
    </script>
    <script>
    function toggleMode() {
        var next = localStorage.getItem('classicMode') !== 'true';
        localStorage.setItem('classicMode', next);
        location.reload();
    }
    document.getElementById('modeToggle').addEventListener('click', toggleMode);
    document.querySelectorAll('#classic-header .mode-toggle').forEach(function(btn) {
        btn.addEventListener('click', toggleMode);
    });
    </script>
    <script>
    /* A — CRT glitch trigger */
    (function() {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        if (document.documentElement.classList.contains('classic-mode')) return;
        function glitch() {
            document.body.classList.add('crt-glitch');
            setTimeout(function() { document.body.classList.remove('crt-glitch'); }, 260);
            setTimeout(glitch, 22000 + Math.random() * 38000);
        }
        setTimeout(glitch, 8000 + Math.random() * 12000);
    })();
    </script>
</body>
