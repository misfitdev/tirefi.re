<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %} - WIP</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
    <style>
        /* === TIRE FIRE WIP v2 ===
         * Terminal brutalist. No glassmorphism. No gradients. No shadows.
         * Amber on near-black. Monospace throughout. Hard edges.
         */

        :root {
            --bg:           #0d0d0d;
            --surface:      #141414;
            --surface-hi:   #1a1a1a;
            --border:       #2a2a2a;
            --border-hi:    #3a3a3a;
            --text:         #cccccc;
            --text-dim:     #666666;
            --text-bright:  #f0f0f0;
            --accent:       #ff8c00;
            --accent-dim:   #cc5500;
            --danger:       #e84040;
            --green:        #40c040;
            --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
        }

        /* Fire GIF — atmosphere, not decoration */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('/tirefirebillow.gif') center center / cover;
            opacity: 0.05;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* === HEADER === */
        .site-header {
            background: var(--surface);
            border-bottom: 2px solid var(--accent);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 2rem;
        }

        .site-title-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.2rem;
        }

        .site-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .site-title:hover {
            color: var(--text-bright);
        }

        .putin-message {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        .nav-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.75rem;
        }

        .main-nav {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            border: 1px solid var(--border);
        }

        .nav-menu li + li {
            border-left: 1px solid var(--border);
        }

        .nav-menu a {
            color: var(--text);
            text-decoration: none;
            padding: 0.4rem 1rem;
            display: block;
            font-size: 0.85rem;
            transition: color 0.1s, background 0.1s;
        }

        .nav-menu a:hover {
            color: var(--accent);
            background: var(--surface-hi);
        }

        .wip-badge {
            display: inline-block;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 0.2rem 0.5rem;
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .ukraine-link {
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.35rem 0.75rem;
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.8rem;
            transition: border-color 0.1s, color 0.1s;
        }

        .ukraine-link:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* === MAIN CONTENT === */
        .main-content {
            padding: 2rem 0;
            min-height: calc(100vh - 200px);
        }

        /* === MEMORIAL STYLES === */
        .memorial-intro {
            text-align: center;
            margin: 3rem 0;
            padding: 2rem;
            border: 1px solid var(--border);
        }

        .memorial-intro h1 {
            font-size: 2.2rem;
            color: var(--accent);
            margin-bottom: 0.75rem;
        }

        .memorial-subtitle {
            color: var(--text-dim);
            font-style: italic;
        }

        .memorial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1px;
            margin: 2rem 0;
            background: var(--border);
            border: 1px solid var(--border);
        }

        .memorial-card {
            background: var(--surface);
            padding: 1.5rem;
            text-align: center;
            transition: background 0.1s;
        }

        .memorial-card:hover {
            background: var(--surface-hi);
        }

        .memorial-flame {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        @keyframes flicker {
            0%   { opacity: 0.55; }
            100% { opacity: 1; }
        }

        @media (prefers-reduced-motion: no-preference) {
            .memorial-flame {
                animation: flicker 2.2s infinite alternate;
            }
        }

        .memorial-card h3 {
            color: var(--accent);
            font-size: 1rem;
            margin-bottom: 0.2rem;
        }

        .memorial-title {
            color: var(--accent-dim);
            font-weight: bold;
            margin-bottom: 0.6rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .memorial-cause {
            color: var(--text-dim);
            font-style: italic;
            line-height: 1.5;
            font-size: 0.85rem;
        }

        .memorial-thanks {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            padding: 2rem;
            margin: 2rem 0;
        }

        .memorial-thanks h2 {
            color: var(--accent);
            margin-bottom: 1.25rem;
        }

        .memorial-thanks p {
            margin-bottom: 0.6rem;
            color: var(--text);
            font-size: 0.9rem;
        }

        .memorial-footer {
            text-align: center;
            margin: 2rem 0;
            padding: 2rem;
            border-top: 1px solid var(--border);
        }

        .memorial-footer em {
            color: var(--accent);
            font-size: 1rem;
        }

        /* === FOOTER === */
        .site-footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 1.25rem 0;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        /* === HERO === */
        .hero {
            text-align: center;
            margin: 3rem 0;
            padding: 3rem 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 3px solid var(--accent);
            position: relative;
        }

        .hero-gif {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 130px;
            height: 130px;
            background: url('/tirefirebillow.gif') center center / cover;
            opacity: 0.7;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .hero-gif:hover {
            opacity: 1;
            border-color: var(--accent);
        }

        .hero h1 {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 0.75rem;
            letter-spacing: -0.03em;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: var(--accent-dim);
            margin-bottom: 1rem;
            font-style: italic;
        }

        .hero-description {
            font-size: 0.95rem;
            color: var(--text-dim);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* === IMAGE OVERLAY === */
        .image-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }

        .image-overlay.active {
            display: flex;
        }

        .overlay-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .overlay-image {
            max-width: 100%;
            max-height: 100%;
            border: 1px solid var(--border);
            display: block;
        }

        .close-button {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 28px;
            height: 28px;
            background: var(--accent);
            border: none;
            color: #000;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: var(--font);
            line-height: 1;
        }

        .close-button:hover {
            background: var(--text-bright);
        }

        /* === SECTIONS GRID === */
        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1px;
            margin: 3rem 0;
            background: var(--border);
            border: 1px solid var(--border);
        }

        .section-card {
            background: var(--surface);
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: background 0.1s;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .section-card:hover {
            background: var(--surface-hi);
        }

        .section-card:hover h3 a {
            color: var(--text-bright);
        }

        .section-icon {
            font-size: 1.1rem;
            display: block;
            margin-bottom: 0.1rem;
        }

        .section-card h3 {
            font-size: 0.95rem;
            margin: 0;
        }

        .section-card h3 a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }

        .section-card h3 a:hover {
            text-decoration: underline;
        }

        .section-card p {
            color: var(--text-dim);
            font-size: 0.78rem;
            line-height: 1.4;
        }

        /* === PAGE CONTENT === */
        .page-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .breadcrumb {
            color: var(--text-dim);
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
        }

        .breadcrumb a {
            color: var(--accent);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .page-header h1 {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }

        .page-subtitle {
            color: var(--text-dim);
            font-style: italic;
            font-size: 1rem;
        }

        .content-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .content-section h2 {
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .content-section h3 {
            color: var(--text-bright);
            margin: 1.25rem 0 0.5rem;
            font-size: 1rem;
        }

        .content-section p {
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .status-banner {
            background: transparent;
            border: 1px solid var(--accent);
            border-left: 3px solid var(--accent);
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: var(--text);
        }

        .status-banner.warning {
            border-color: var(--danger);
        }

        .main-content-area {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text);
        }

        .main-content-area p {
            margin-bottom: 1.25rem;
        }

        .quote-box {
            background: var(--surface);
            border-left: 3px solid var(--accent);
            padding: 1.25rem 1.5rem;
            margin: 1.5rem 0;
        }

        .quote-box blockquote {
            margin: 0;
            font-style: italic;
            color: var(--text);
        }

        .quote-box cite {
            display: block;
            margin-top: 0.75rem;
            color: var(--accent-dim);
            font-size: 0.85rem;
        }

        .fun-facts {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .fun-facts h3 {
            color: var(--accent);
            margin-bottom: 0.75rem;
        }

        .fun-facts ul {
            list-style: none;
            padding: 0;
        }

        .fun-facts li {
            padding: 0.35rem 0;
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .fun-facts li:last-child {
            border-bottom: none;
        }

        .fun-facts li::before {
            content: "> ";
            color: var(--accent);
            font-weight: bold;
        }

        .navigation-footer {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin: 2rem 0;
        }

        .nav-button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            font-weight: bold;
            flex: 1;
            text-align: center;
            font-family: var(--font);
            font-size: 0.85rem;
            transition: border-color 0.1s, color 0.1s, background 0.1s;
        }

        .nav-button:hover {
            border-color: var(--accent);
            background: var(--surface);
            color: var(--text-bright);
        }

        /* === SHARED PAGE COMPONENTS === */
        /* Used across multiple content pages */
        .hero-image {
            width: 100%;
            max-width: 600px;
            height: auto;
            border: 1px solid var(--border);
            margin: 1.5rem auto;
            display: block;
        }

        /* === FOCUS STYLES (WCAG AAA) === */
        a:focus-visible,
        button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* === SKIP NAV (ACCESSIBILITY) === */
        .skip-nav {
            position: absolute;
            top: -100%;
            left: 0;
            background: var(--accent);
            color: #000;
            padding: 0.5rem 1rem;
            text-decoration: none;
            font-weight: bold;
            z-index: 9999;
        }

        .skip-nav:focus {
            top: 0;
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 0.75rem;
            }

            .nav-area {
                align-items: flex-start;
                width: 100%;
            }

            .main-nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            .nav-menu {
                flex-wrap: wrap;
            }

            .hero-gif {
                position: static;
                margin: 0 auto 1.5rem auto;
                width: 90px;
                height: 90px;
            }

            .hero h1 {
                font-size: 1.75rem;
            }

            .navigation-footer {
                flex-direction: column;
            }

            .sections-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .sections-grid {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            .site-header,
            .site-footer,
            .image-overlay,
            body::before {
                display: none;
            }

            body {
                background: #fff;
                color: #000;
            }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-nav">Skip to main content</a>

    <header class="site-header" role="banner">
        <div class="container">
            <div class="header-content">
                <div class="site-title-section">
                    <a href="/.wip/" class="site-title">tirefi.re</a>
                    <div class="putin-message" aria-label="Ukrainian phrase: Putin is a dickhead">Пу́тін хуйло́</div>
                </div>
                <div class="nav-area">
                    <div class="main-nav">
                        <nav aria-label="Primary navigation">
                            <ul class="nav-menu">
                                <li><a href="/.wip/">Home</a></li>
                                <li><a href="/.wip/in-memoriam/">In Memoriam</a></li>
                                <li><a href="/">Classic Site</a></li>
                            </ul>
                        </nav>
                        <span class="wip-badge" aria-label="Work in progress version 2">[WIP v2]</span>
                    </div>
                    <a href="https://devopsdays.com.ua/" class="ukraine-link" target="_blank" rel="noopener noreferrer" aria-label="DevOpsDays Ukraine — opens in new tab">
                        DevOpsDays Ukraine
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content" id="main-content">
        <div class="container">
            {{ content }}
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="container">
            <p>&copy; {{ site.time | date: "%Y" }} tirefi.re — the tire fire burns eternal</p>
        </div>
    </footer>

    <div class="image-overlay" id="imageOverlay" role="dialog" aria-modal="true" aria-label="Tire fire image fullscreen">
        <div class="overlay-content">
            <img src="/tirefirebillow.gif" alt="A tire fire, billowing smoke — the eternal symbol of infrastructure in distress" class="overlay-image">
            <button class="close-button" onclick="closeOverlay()" aria-label="Close fullscreen image">&times;</button>
        </div>
    </div>

    <script>
        function openOverlay() {
            var overlay = document.getElementById('imageOverlay');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            overlay.querySelector('.close-button').focus();
        }

        function closeOverlay() {
            document.getElementById('imageOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeOverlay();
        });

        document.getElementById('imageOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeOverlay();
        });

        document.addEventListener('DOMContentLoaded', function() {
            var heroGif = document.querySelector('.hero-gif');
            if (heroGif) {
                heroGif.setAttribute('role', 'button');
                heroGif.setAttribute('tabindex', '0');
                heroGif.setAttribute('aria-label', 'Open tire fire image fullscreen');
                heroGif.addEventListener('click', openOverlay);
                heroGif.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        openOverlay();
                    }
                });
            }
        });
    </script>
</body>
</html>
