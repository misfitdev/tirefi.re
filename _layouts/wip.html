<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %} - WIP</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
    <style>
        :root {
            --bg:           #1c1c1c;
            --surface:      #252525;
            --surface-hi:   #303030;
            --border:       #3a3a3a;
            --border-hi:    #505050;
            --text:         #b8b8b8;
            --text-bright:  #d8d8d8;
            --text-dim:     #a0a0a0;
            --link:         #c0c0c0;
            --danger:       #c84040;
            --success:      #408040;
            /* compat: pages referencing --accent get a neutral gray until cleaned up */
            --accent:       var(--text-dim);
            --accent-dim:   var(--text-dim);
            --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.25rem;
        }

        /* === SKIP NAV === */
        .skip-nav {
            position: absolute;
            top: -100%;
            left: 0;
            background: var(--text-bright);
            color: var(--bg);
            padding: 0.5rem 1rem;
            text-decoration: none;
            font-weight: bold;
            z-index: 9999;
        }

        .skip-nav:focus {
            top: 0;
        }

        /* === HEADER === */
        .site-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .site-title-section {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .site-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-bright);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .site-title:hover {
            color: #ffffff;
        }

        .putin-message {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.04em;
        }

        .nav-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.4rem;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            border: 1px solid var(--border);
        }

        .nav-menu li + li {
            border-left: 1px solid var(--border);
        }

        .nav-menu a {
            color: var(--text);
            text-decoration: none;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            min-height: 44px;
            transition: color 0.1s, background 0.1s;
        }

        .nav-menu a:hover {
            color: var(--text-bright);
            background: var(--surface-hi);
        }

        .ukraine-link {
            display: inline-flex;
            align-items: center;
            background: transparent;
            border: 1px solid var(--border);
            padding: 0 0.75rem;
            min-height: 44px;
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.75rem;
            transition: border-color 0.1s, color 0.1s;
        }

        .ukraine-link:hover {
            border-color: var(--border-hi);
            color: var(--text);
        }

        /* === MAIN CONTENT === */
        .main-content {
            padding: 2rem 0;
            min-height: calc(100vh - 160px);
        }

        /* === FOOTER === */
        .site-footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 1rem 0;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        /* === PAGE HEADER (individual pages) === */
        .page-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .breadcrumb {
            color: var(--text-dim);
            margin-bottom: 0.6rem;
            font-size: 0.8rem;
        }

        .breadcrumb a {
            color: var(--link);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .page-header h1 {
            font-size: 1.8rem;
            color: var(--text-bright);
            margin-bottom: 0.2rem;
        }

        .page-subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* === CONTENT SECTIONS === */
        .content-section {
            border: 1px solid var(--border);
            border-left: 3px solid var(--border-hi);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.25rem;
        }

        .content-section h2 {
            color: var(--text-bright);
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }

        .content-section h3 {
            color: var(--text);
            margin: 1rem 0 0.4rem;
            font-size: 0.95rem;
        }

        .content-section p {
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        .status-banner {
            border: 1px solid var(--border);
            border-left: 3px solid var(--border-hi);
            padding: 0.65rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.85rem;
            color: var(--text);
        }

        .status-banner.warning {
            border-left-color: var(--danger);
        }

        .main-content-area {
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text);
        }

        .main-content-area p {
            margin-bottom: 1rem;
        }

        .quote-box {
            border-left: 3px solid var(--border-hi);
            padding: 1rem 1.25rem;
            margin: 1.25rem 0;
        }

        .quote-box blockquote {
            margin: 0;
            font-style: italic;
            color: var(--text);
        }

        .quote-box cite {
            display: block;
            margin-top: 0.6rem;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .fun-facts {
            border: 1px solid var(--border);
            border-left: 3px solid var(--border-hi);
            padding: 1.25rem 1.5rem;
            margin: 1.25rem 0;
        }

        .fun-facts h3 {
            color: var(--text-bright);
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
        }

        .fun-facts ul {
            list-style: none;
            padding: 0;
        }

        .fun-facts li {
            padding: 0.3rem 0;
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .fun-facts li:last-child {
            border-bottom: none;
        }

        .fun-facts li::before {
            content: "> ";
            color: var(--text);
        }

        /* === MEMORIAL STYLES === */
        .memorial-intro {
            margin: 2rem 0;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .memorial-intro h1 {
            font-size: 1.8rem;
            color: var(--text-bright);
            margin-bottom: 0.5rem;
        }

        .memorial-subtitle {
            color: var(--text-dim);
            font-style: italic;
            font-size: 0.9rem;
        }

        .memorial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1px;
            margin: 1.5rem 0;
            background: var(--border);
            border: 1px solid var(--border);
        }

        .memorial-card {
            background: var(--surface);
            padding: 1.25rem;
            transition: background 0.1s;
        }

        .memorial-card:hover {
            background: var(--surface-hi);
        }

        .memorial-flame {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        @media (prefers-reduced-motion: no-preference) {
            @keyframes flicker {
                0%   { opacity: 0.5; }
                100% { opacity: 1; }
            }
            .memorial-flame {
                animation: flicker 2.5s infinite alternate;
            }
        }

        .memorial-card h3 {
            color: var(--text-bright);
            font-size: 0.95rem;
            margin-bottom: 0.15rem;
        }

        .memorial-title {
            color: var(--text-dim);
            font-weight: bold;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .memorial-cause {
            color: var(--text-dim);
            font-style: italic;
            line-height: 1.4;
            font-size: 0.8rem;
        }

        .memorial-thanks {
            border: 1px solid var(--border);
            border-left: 3px solid var(--border-hi);
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .memorial-thanks h2 {
            color: var(--text-bright);
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .memorial-thanks p {
            margin-bottom: 0.5rem;
            color: var(--text);
            font-size: 0.85rem;
        }

        .memorial-footer {
            margin: 1.5rem 0;
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* === NAV FOOTER (prev/next) === */
        .navigation-footer {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin: 2rem 0;
        }

        .nav-button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--link);
            padding: 0 1.5rem;
            min-height: 44px;
            text-decoration: none;
            flex: 1;
            text-align: center;
            font-family: var(--font);
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.1s, color 0.1s;
        }

        .nav-button:hover {
            border-color: var(--border-hi);
            color: var(--text-bright);
        }

        /* === IMAGE OVERLAY === */
        .image-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .image-overlay.active {
            display: flex;
        }

        .overlay-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .overlay-image {
            max-width: 100%;
            max-height: 90vh;
            border: 1px solid var(--border);
            display: block;
        }

        .close-button {
            position: absolute;
            top: -22px;
            right: -22px;
            width: 44px;
            height: 44px;
            background: var(--surface-hi);
            border: 1px solid var(--border-hi);
            color: var(--text-bright);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font);
            line-height: 1;
        }

        .close-button:hover {
            background: var(--border-hi);
            color: #ffffff;
        }

        /* === SHARED COMPONENTS === */
        .hero-image {
            width: 100%;
            max-width: 600px;
            height: auto;
            border: 1px solid var(--border);
            margin: 1.25rem auto;
            display: block;
        }

        /* === INDEX / FILTER === */
        .index-header {
            margin: 2rem 0 1.5rem;
        }

        .index-header h1 {
            font-size: 1.5rem;
            color: var(--text-bright);
            margin-bottom: 0.25rem;
        }

        .index-tagline {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .filter-controls {
            margin-bottom: 1.5rem;
        }

        .filter-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-bright);
            font-family: var(--font);
            font-size: 0.9rem;
            padding: 0.6rem 0.75rem;
            outline: none;
        }

        .filter-input:focus {
            border-color: var(--border-hi);
        }

        .filter-input::placeholder {
            color: var(--text-dim);
        }

        .filter-list {
            list-style: none;
            display: flex;
            flex-direction: column;
        }

        .filter-item {
            border-bottom: 1px solid var(--border);
        }

        .filter-item.first-visible {
            border-top: 1px solid var(--border);
        }

        .filter-item a {
            display: grid;
            grid-template-columns: 18ch 1fr;
            gap: 1.5rem;
            padding: 0.55rem 0.5rem;
            color: inherit;
            text-decoration: none;
            font-size: 0.875rem;
            min-height: 44px;
            align-items: center;
            transition: background 0.08s;
        }

        .filter-item a:hover {
            background: var(--surface);
        }

        .item-name {
            color: var(--text-bright);
        }

        .item-desc {
            color: var(--text-dim);
        }

        .filter-separator {
            display: none;
            list-style: none;
        }

        .filter-separator-inner {
            height: 3px;
            background: var(--border-hi);
            filter: blur(0.8px);
        }

        .filter-empty {
            color: var(--text-dim);
            font-size: 0.85rem;
            padding: 1.5rem 0;
        }

        /* === FOCUS STYLES === */
        a:focus-visible,
        button:focus-visible,
        input:focus-visible {
            outline: 2px solid var(--text);
            outline-offset: 2px;
        }

        /* === RESPONSIVE === */
        @media (max-width: 640px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.6rem;
            }

            .nav-area {
                align-items: flex-start;
                width: 100%;
            }

            .page-header h1 {
                font-size: 1.4rem;
            }

            .navigation-footer {
                flex-direction: column;
            }

            .filter-item a {
                grid-template-columns: 1fr;
                gap: 0.2rem;
            }

            .item-desc {
                font-size: 0.8rem;
            }
        }

        @media print {
            .site-header,
            .site-footer,
            .image-overlay {
                display: none;
            }

            body {
                background: #fff;
                color: #000;
            }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-nav">Skip to main content</a>

    <header class="site-header" role="banner">
        <div class="container">
            <div class="header-content">
                <div class="site-title-section">
                    <a href="/.wip/" class="site-title">tirefi.re</a>
                    <div class="putin-message" aria-label="Ukrainian phrase: Putin is a dickhead">Пу́тін хуйло́</div>
                </div>
                <div class="nav-area">
                    <nav aria-label="Primary navigation">
                        <ul class="nav-menu">
                            <li><a href="/.wip/">Home</a></li>
                            <li><a href="/.wip/in-memoriam/">In Memoriam</a></li>
                            <li><a href="/">Classic</a></li>
                        </ul>
                    </nav>
                    <a href="https://devopsdays.com.ua/" class="ukraine-link" target="_blank" rel="noopener noreferrer" aria-label="DevOpsDays Ukraine — opens in new tab">
                        DevOpsDays Ukraine
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content" id="main-content">
        <div class="container">
            {{ content }}
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="container">
            <p>tirefi.re &mdash; the tire fire burns eternal</p>
        </div>
    </footer>

    <div class="image-overlay" id="imageOverlay" role="dialog" aria-modal="true" aria-label="Tire fire image fullscreen">
        <div class="overlay-content">
            <img src="/tirefirebillow.gif" alt="A tire fire, billowing smoke" class="overlay-image" id="overlayImage">
            <button class="close-button" id="overlayClose" aria-label="Close fullscreen image">&times;</button>
        </div>
    </div>

    <script>
        (function() {
            var overlay = document.getElementById('imageOverlay');
            var closeBtn = document.getElementById('overlayClose');
            var lastFocused = null;

            function openOverlay(triggerEl) {
                lastFocused = triggerEl || document.activeElement;
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                closeBtn.focus();
            }

            function closeOverlay() {
                overlay.classList.remove('active');
                document.body.style.overflow = '';
                if (lastFocused) lastFocused.focus();
            }

            closeBtn.addEventListener('click', closeOverlay);

            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) closeOverlay();
            });

            document.addEventListener('keydown', function(e) {
                if (!overlay.classList.contains('active')) return;
                if (e.key === 'Escape') {
                    closeOverlay();
                } else if (e.key === 'Tab') {
                    /* Focus trap: only close button is focusable in the overlay */
                    e.preventDefault();
                    closeBtn.focus();
                }
            });

            document.addEventListener('DOMContentLoaded', function() {
                var heroGif = document.querySelector('.hero-gif');
                if (heroGif) {
                    heroGif.setAttribute('role', 'button');
                    heroGif.setAttribute('tabindex', '0');
                    heroGif.setAttribute('aria-label', 'Open tire fire image fullscreen');
                    heroGif.addEventListener('click', function() { openOverlay(heroGif); });
                    heroGif.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            openOverlay(heroGif);
                        }
                    });
                }
            });

            window.openOverlay = openOverlay;
        })();
    </script>
</body>
</html>
